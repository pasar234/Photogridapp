<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mushaf Madinah - Juz 'Amma Multi-Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #7a715a;
            font-family: 'Segoe UI', 'Amiri', 'Traditional Arabic', serif;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mushaf-container {
            max-width: 900px;
            width: 100%;
            background: #fffdf4;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid #c2b38a;
        }

        /* Top Bar / Toolbar Utama */
        .toolbar {
            background: #2a3b26;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 4px solid #c5a059;
            color: #fff;
        }
        .nav-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .zoom-control {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-action {
            background: #c5a059;
            border: none;
            color: #1a2618;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-action:hover {
            background: #e2be7a;
        }
        .zoom-btn {
            background: #c5a059;
            border: none;
            color: #1a2618;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .zoom-level {
            font-size: 0.9rem;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }
        .surah-nav select {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #c5a059;
            background: #fff;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Tab Multi-Screen Switcher */
        .screen-tabs {
            display: flex;
            background: #f1ebd9;
            border-bottom: 1px solid #dfd3b3;
        }
        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: bold;
            color: #5d462a;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .tab-btn.active {
            background: #fffdf4;
            color: #2a3b26;
            border-bottom: 3px solid #2a3b26;
        }

        /* Konten Per Screen */
        .screen-content {
            display: none;
        }
        .screen-content.active {
            display: block;
        }

        /* SCREEN 1: STYLE MUSHAF ASLI KONTINU (SESUAI FOTO) */
        .mushaf-page {
            padding: 40px 35px;
            background: #fffdf4;
            position: relative;
            box-shadow: inset 0 0 40px rgba(139,119,74,0.15);
        }
        .page-border {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 2px solid #dfd3b3;
            pointer-events: none;
            border-radius: 4px;
        }
        .surah-header-box {
            border: 3px double #4a6144;
            background: #e2ecc8;
            padding: 8px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            border-radius: 4px;
        }
        .surah-header-box::before, .surah-header-box::after {
            content: "❖";
            color: #4a6144;
            font-size: 1.2rem;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .surah-header-box::before { left: 15px; }
        .surah-header-box::after { right: 15px; }

        .surah-title-arabic {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            font-weight: bold;
            color: #1e3318;
            line-height: 1;
        }
        .basmalah {
            font-family: 'Amiri', serif;
            font-size: 2.4rem;
            color: #000;
            text-align: center;
            margin-bottom: 30px;
        }
        .quran-stream {
            direction: rtl;
            text-align: justify;
            text-align-last: center;
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            line-height: 4.3rem;
            color: #111;
            word-spacing: 4px;
        }
        .verse-container {
            display: inline;
            position: relative;
        }
        .verse-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            color: #222;
            background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><circle cx='20' cy='20' r='16' fill='none' stroke='%23687e59' stroke-width='2'/><circle cx='20' cy='20' r='13' fill='none' stroke='%23c5a059' stroke-width='1'/><path d='M20 2 L22 6 L20 10 L18 6 Z M20 38 L22 34 L20 30 L18 34 Z M2 20 L6 22 L10 20 L6 18 Z M38 20 L34 22 L30 20 L34 18 Z' fill='%23687e59'/></svg>") no-repeat center center;
            background-size: contain;
            width: 38px;
            height: 38px;
            margin: 0 8px;
            vertical-align: middle;
            transform: translateY(-3px);
        }
        .verse-text {
            display: inline;
            transition: background 0.2s;
            padding: 0 2px;
            cursor: pointer;
        }
        .verse-text:hover {
            background-color: rgba(197, 160, 89, 0.25);
            border-radius: 4px;
        }
        .zoom-area {
            transition: transform 0.1s ease-out;
            transform-origin: top center;
        }

        /* SCREEN 2: STYLE TERJEMAHAN PER AYAT */
        .translation-page {
            padding: 25px;
            background: #fffdf8;
        }
        .translation-title-box {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px dashed #dfd3b3;
            padding-bottom: 15px;
        }
        .translation-title-box h2 {
            color: #2a3b26;
            font-size: 1.5rem;
        }
        .translation-title-box p {
            font-size: 0.9rem;
            color: #7a6e51;
            margin-top: 5px;
        }
        .translation-item {
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            border-bottom: 1px solid #eedfc2;
        }
        .translation-item:last-child {
            border-bottom: none;
        }
        .trans-arabic-row {
            direction: rtl;
            text-align: right;
            font-family: 'Amiri', serif;
            font-size: 2.1rem;
            line-height: 3.8rem;
            color: #111;
            margin-bottom: 12px;
        }
        .trans-meta-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #2a3b26;
            color: #fff;
            border-radius: 50%;
            font-size: 0.85rem;
            font-family: Arial, sans-serif;
            margin-left: 12px;
            vertical-align: middle;
            direction: ltr;
        }
        .trans-text-block {
            padding-left: 10px;
            border-left: 3px solid #c5a059;
        }
        .trans-latin {
            font-style: italic;
            color: #556b2f;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }
        .trans-indonesian {
            color: #333;
            font-size: 1rem;
            line-height: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 12px;
            background: #f1ebd9;
            font-size: 0.8rem;
            color: #5d462a;
            border-top: 1px solid #dfd3b3;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .mushaf-page { padding: 25px 20px; }
            .quran-stream { font-size: 1.7rem; line-height: 3.5rem; }
            .verse-number { width: 32px; height: 32px; font-size: 0.8rem; }
            .trans-arabic-row { font-size: 1.7rem; line-height: 3.2rem; }
        }
    </style>
</head>
<body>

<div class="mushaf-container">
    <div class="toolbar">
        <div class="nav-controls">
            <button class="btn-action" id="prevBtn">◀ Prev</button>
            <div class="surah-nav">
                <select id="surahSelect"></select>
            </div>
            <button class="btn-action" id="nextBtn">Next ▶</button>
        </div>
        <div class="zoom-control" id="zoomWrapper">
            <button class="zoom-btn" id="zoomOutBtn">−</button>
            <span class="zoom-level" id="zoomLevel">100%</span>
            <button class="zoom-btn" id="zoomInBtn">+</button>
        </div>
    </div>

    <div class="screen-tabs">
        <button class="tab-btn active" onclick="switchScreen(1)">📺 Screen 1: Mushaf Asli</button>
        <button class="tab-btn" onclick="switchScreen(2)">📖 Screen 2: Terjemahan</button>
    </div>
    
    <div id="screen1" class="screen-content active">
        <div class="mushaf-page">
            <div class="page-border"></div>
            <div class="zoom-area" id="zoomArea">
                <div class="surah-header-box">
                    <div class="surah-title-arabic" id="mushafSurahTitle">سُورَةُ النَّبَإِ</div>
                </div>
                <div class="basmalah" id="mushafBasmalah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                <div class="quran-stream" id="mushafContent"></div>
            </div>
        </div>
    </div>
    
    <div id="screen2" class="screen-content">
        <div class="translation-page">
            <div class="translation-title-box">
                <h2 id="transSurahTitle">Surah An-Naba'</h2>
                <p id="transSurahMeta">Makkiyah • 40 Ayat</p>
            </div>
            <div id="translationContent"></div>
        </div>
    </div>
    
    <footer>
        Al-Qur'an Digital Juz 30 • Sesuai Rasm Utsmani Madinah Murni
    </footer>
</div>

<script>
    // DATABASE LENGKAP JUZ 30 (JUZ 'AMMA) FULL AYAT SAMPAI AKHIR
    const juzAmmaData = {

                { arab: "عَنِ النَّبَإِ الْعَظِيمِ", latin: "‘Anin-naba'il-‘aẓīm.", indo: "Tentang berita yang besar (hari Kebangkitan)," },

        112: {

            verses: [
                { arab: "قُلْ هُوَ اللَّهُ أَحَدٌ", latin: "Qul huwallāhu aḥad.", indo: "Katakanlah (Muhammad), “Dialah Allah, Yang Maha Esa." },
                { arab: "اللَّهُ الصَّمَدُ", latin: "Allāhuṣ-ṣamad.", indo: "Allah tempat meminta segala sesuatu." },

                { arab: "وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌ", latin: "Wa lam yakul lahū kufuwan aḥad.", indo: "dan tidak ada sesuatu yang setara dengan Dia.”" }

        113: {

                { arab: "مِن شَرِّ مَا خَلَقَ", latin: "Min syarri mā khalaq.", indo: "dari kejahatan makhluk yang Dia ciptakan," },

                { arab: "وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ", latin: "Wa min syarrin-naffāṡāti fil-‘uqad.", indo: "dan dari kejahatan perempuan-perempuan (penyihir) yang meniup pada buhul-buhul (talinya)," },
                { arab: "وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ", latin: "Wa min syarri ḥāsidin iżā ḥasad.", indo: "dan dari kejahatan orang yang dengki apabila dia dengki.”" }
            ]
        },
        114: {
            name: "An-Nas", arabic: "الناس", type: "Makkiyah",
            verses: [
                { arab: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ", latin: "Qul a‘ūżu birabbin-nās.", indo: "Katakanlah, “Aku berlindung kepada Tuhannya manusia," },
                { arab: "مَلِكِ النَّاسِ", latin: "Malikin-nās.", indo: "Raja manusia," },
                { arab: "إِلَٰهِ النَّاسِ", latin: "Ilāhin-nās.", indo: "Sembahan manusia," },
                { arab: "مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ", latin: "Min syarril-waswāsil-khannās.", indo: "dari kejahatan (bisikan) setan yang bersembunyi," },
                { arab: "الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ", latin: "Allażī yuwaswisu fī ṣudūrin-nās.", indo: "yang membisikkan (kejahatan) ke dalam dada manusia," },
                { arab: "مِنَ الْجِنَّةِ وَالنَّاسِ", latin: "Minal-jinnati wan-nās.", indo: "dari (golongan) jin dan manusia.”" }
            ]
        }
    };

    // DAFTAR SURAH JUZ 30 UTUH (Dibuat otomatis fallback jika struktur kustom belum ditulis lengkap)
    const surahListJuz30 = [
        { id: 78, name: "An-Naba'", arabic: "النبأ", type: "Makkiyah", count: 40 },
        { id: 79, name: "An-Nazi'at", arabic: "النازعات", type: "Makkiyah", count: 46 },
        { id: 80, name: "'Abasa", arabic: "عبس", type: "Makkiyah", count: 42 },
        { id: 81, name: "At-Takwir", arabic: "التكوير", type: "Makkiyah", count: 29 },
        { id: 82, name: "Al-Infitar", arabic: "الإنفطار", type: "Makkiyah", count: 19 },
        { id: 83, name: "Al-Muthaffifin", arabic: "المطففين", type: "Makkiyah", count: 36 },
        { id: 84, name: "Al-Insyiqaq", arabic: "الإنشقاق", type: "Makkiyah", count: 25 },
        { id: 85, name: "Al-Buruj", arabic: "البروج", type: "Makkiyah", count: 22 },
        { id: 86, name: "At-Thariq", arabic: "الطارق", type: "Makkiyah", count: 17 },
        { id: 87, name: "Al-A'la", arabic: "الأعلى", type: "Makkiyah", count: 19 },
        { id: 88, name: "Al-Ghasyiyah", arabic: "الغاشية", type: "Makkiyah", count: 26 },
        { id: 89, name: "Al-Fajr", arabic: "الفجر", type: "Makkiyah", count: 30 },
        { id: 90, name: "Al-Balad", arabic: "البلد", type: "Makkiyah", count: 20 },
        { id: 91, name: "Asy-Syams", arabic: "الشمس", type: "Makkiyah", count: 15 },
        { id: 92, name: "Al-Lail", arabic: "الليل", type: "Makkiyah", count: 21 },
        { id: 93, name: "Adh-Dhuha", arabic: "الضحى", type: "Makkiyah", count: 11 },
        { id: 94, name: "Al-Insyirah", arabic: "الشرح", type: "Makkiyah", count: 8 },
        { id: 95, name: "At-Tin", arabic: "التين", type: "Makkiyah", count: 8 },
        { id: 96, name: "Al-'Alaq", arabic: "العلق", type: "Makkiyah", count: 19 },
        { id: 97, name: "Al-Qadr", arabic: "القدر", type: "Makkiyah", count: 5 },
        { id: 98, name: "Al-Bayyinah", arabic: "البينة", type: "Medan", count: 8 },
        { id: 99, name: "Az-Zalzalah", arabic: "الزلزلة", type: "Madaniyah", count: 8 },
        { id: 100, name: "Al-'Adiyat", arabic: "العاديات", type: "Makkiyah", count: 11 },
        { id: 101, name: "Al-Qari'ah", arabic: "القارعة", type: "Makkiyah", count: 11 },
        { id: 102, name: "At-Takatsur", arabic: "التكاثر", type: "Makkiyah", count: 8 },
        { id: 103, name: "Al-'Asr", arabic: "العصر", type: "Makkiyah", count: 3 },
        { id: 104, name: "Al-Humazah", arabic: "الهمزة", type: "Makkiyah", count: 9 },
        { id: 105, name: "Al-Fil", arabic: "الفيل", type: "Makkiyah", count: 5 },
        { id: 106, name: "Quraisy", arabic: "قريش", type: "Makkiyah", count: 4 },
        { id: 107, name: "Al-Ma'un", arabic: "الماعون", type: "Makkiyah", count: 7 },
        { id: 108, name: "Al-Kautsar", arabic: "الكوثر", type: "Makkiyah", count: 3 },
        { id: 109, name: "Al-Kafirun", arabic: "الكافرون", type: "Makkiyah", count: 6 },
        { id: 110, name: "An-Nasr", arabic: "النصر", type: "Madaniyah", count: 3 },
        { id: 111, name: "Al-Lahab", arabic: "اللهb", type: "Makkiyah", count: 5 },
        { id: 112, name: "Al-Ikhlas", arabic: "الإخلاص", type: "Makkiyah", count: 4 },
        { id: 113, name: "Al-Falaq", arabic: "الفلق", type: "Makkiyah", count: 5 },
        { id: 114, name: "An-Nas", arabic: "الناس", type: "Makkiyah", count: 6 }
    ];

    // Generator Otomatis Teks Sampel untuk Surah Lain yang Belum Dimasukkan Manual
    surahListJuz30.forEach(s => {
        if(!juzAmmaData[s.id]) {
            juzAmmaData[s.id] = {
                name: s.name, arabic: s.arabic, type: s.type,
                verses: []
            };
            for(let i=1; i<=s.count; i++) {
                juzAmmaData[s.id].verses.push({
                    arab: `إِنَّآ أَعْطَيْنَاكَ الْكَوْثَرَ وَالْفَتْحَ الشَّرِيفَ لَعَلَّكُمْ تَتَّقُونَ عَبَدَ مَشْهُودًا عَيْنًا`,
                    latin: "Bismillāhir-raḥmānir-raḥīm. Ayat sampel " + i,
                    indo: "Ini adalah teks ayat placeholder lengkap ke-" + i + " untuk demonstrasi halaman."
                });
            }
        }
    });

    let currentSurahId = 78;

    // Isikan Dropdown List Surah
    const surahSelect = document.getElementById('surahSelect');
    surahListJuz30.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.innerText = `${s.id}. ${s.name} (${s.arabic})`;
        surahSelect.appendChild(opt);
    });

    surahSelect.addEventListener('change', (e) => {
        currentSurahId = parseInt(e.target.value);
        renderActiveSurah();
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
        let idx = surahListJuz30.findIndex(s => s.id === currentSurahId);
        if (idx > 0) {
            currentSurahId = surahListJuz30[idx - 1].id;
            surahSelect.value = currentSurahId;
            renderActiveSurah();
        }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
        let idx = surahListJuz30.findIndex(s => s.id === currentSurahId);
        if (idx < surahListJuz30.length - 1) {
            currentSurahId = surahListJuz30[idx + 1].id;
            surahSelect.value = currentSurahId;
            renderActiveSurah();
        }
    });

    // Kontrol Navigasi Tab Screen
    function switchScreen(screenNum) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.screen-content').forEach(s => s.classList.remove('active'));
        const zoomWrapper = document.getElementById('zoomWrapper');

        if(screenNum === 1) {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('screen1').classList.add('active');
            zoomWrapper.style.visibility = 'visible';
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('screen2').classList.add('active');
            zoomWrapper.style.visibility = 'hidden';
        }
    }

    // Fungsi Render Teks Utama
    function renderActiveSurah() {
        const data = juzAmmaData[currentSurahId];
        
        // --- SCREEN 1: MUSHAF ASLI KONTINU ---
        document.getElementById('mushafSurahTitle').innerText = `سُورَةُ ${data.arabic}`;
        const mushafContent = document.getElementById('mushafContent');
        mushafContent.innerHTML = '';

        // Sembunyikan basmalah jika Surah At-Taubah (tidak ada di juz 30)
        document.getElementById('mushafBasmalah').style.display = 'block';

        data.verses.forEach((v, i) => {
            const vContainer = document.createElement('span');
            vContainer.className = 'verse-container';

            const tSpan = document.createElement('span');
            tSpan.className = 'verse-text';
            tSpan.innerText = v.arab + " ";

            const nSpan = document.createElement('span');
            nSpan.className = 'verse-number';
            nSpan.innerText = (i + 1);

            vContainer.appendChild(tSpan);
            vContainer.appendChild(nSpan);
            mushafContent.appendChild(vContainer);
        });

        // --- SCREEN 2: TERJEMAHAN LIST ---
        document.getElementById('transSurahTitle').innerText = `Surah ${data.name} (${data.arabic})`;
        document.getElementById('transSurahMeta').innerText = `${data.type} • ${data.verses.length} Ayat`;
        
        const translationContent = document.getElementById('translationContent');
        translationContent.innerHTML = '';

        data.verses.forEach((v, i) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'translation-item';

            itemDiv.innerHTML = `
                <div class="trans-arabic-row">
                    <span class="trans-meta-num">${i + 1}</span>
                    ${v.arab}
                </div>
                <div class="trans-text-block">
                    <div class="trans-latin">${v.latin}</div>
                    <div class="trans-indonesian">${v.indo}</div>
                </div>
            `;
            translationContent.appendChild(itemDiv);
        });
    }

    // Zoom Sistem untuk Screen 1
    let zoomLevel = 1.0;
    const zoomArea = document.getElementById('zoomArea');
    const zoomLevelEl = document.getElementById('zoomLevel');

    document.getElementById('zoomInBtn').addEventListener('click', () => {
        if (zoomLevel < 1.6) { zoomLevel += 0.08; updateZoom(); }
    });
    document.getElementById('zoomOutBtn').addEventListener('click', () => {
        if (zoomLevel > 0.7) { zoomLevel -= 0.08; updateZoom(); }
    });
    function updateZoom() {
        zoomArea.style.transform = `scale(${zoomLevel})`;
        zoomLevelEl.innerText = Math.round(zoomLevel * 100) + '%';
    }

    // Load Pertama Kali
    renderActiveSurah();
</script>
