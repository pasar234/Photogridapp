<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mushaf Madinah - Juz 'Amma Multi-Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #7a715a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mushaf-container {
            max-width: 900px;
            width: 100%;
            background: #fffdf4;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid #c2b38a;
        }

        /* Top Bar & Kontrol */
        .toolbar {
            background: #2a3b26;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 4px solid #c5a059;
            color: #fff;
        }
        .nav-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .zoom-control {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-action {
            background: #c5a059;
            border: none;
            color: #1a2618;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-action:hover {
            background: #e2be7a;
        }
        .zoom-btn {
            background: #c5a059;
            border: none;
            color: #1a2618;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .zoom-level {
            font-size: 0.9rem;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }
        .surah-nav select {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #c5a059;
            background: #fff;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Tab Screen Switcher */
        .screen-tabs {
            display: flex;
            background: #f1ebd9;
            border-bottom: 1px solid #dfd3b3;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: bold;
            color: #5d462a;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .tab-btn.active {
            background: #fffdf4;
            color: #2a3b26;
            border-bottom: 3px solid #2a3b26;
        }

        /* Area Konten Screen */
        .screen-content {
            display: none;
        }
        .screen-content.active {
            display: block;
        }

        /* SCREEN 1: STYLE MUSHAF ASLI (PERSIS FOTO) */
        .mushaf-page {
            padding: 40px 35px;
            background: #fffdf4;
            position: relative;
            box-shadow: inset 0 0 40px rgba(139,119,74,0.15);
        }
        .page-border {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 2px solid #dfd3b3;
            pointer-events: none;
            border-radius: 4px;
        }
        .surah-header-box {
            border: 3px double #4a6144;
            background: #e2ecc8;
            padding: 8px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            border-radius: 4px;
        }
        .surah-header-box::before, .surah-header-box::after {
            content: "❖";
            color: #4a6144;
            font-size: 1.2rem;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .surah-header-box::before { left: 15px; }
        .surah-header-box::after { right: 15px; }

        .surah-title-arabic {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            font-weight: bold;
            color: #1e3318;
            line-height: 1;
        }
        .basmalah {
            font-family: 'Amiri', serif;
            font-size: 2.4rem;
            color: #000;
            text-align: center;
            margin-bottom: 30px;
        }
        .quran-stream {
            direction: rtl;
            text-align: justify;
            text-align-last: center;
            font-family: 'Amiri', serif;
            font-size: 2.3rem;
            line-height: 4.4rem;
            color: #111;
            word-spacing: 4px;
        }
        .verse-container {
            display: inline;
            position: relative;
        }
        .verse-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            color: #222;
            background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><circle cx='20' cy='20' r='16' fill='none' stroke='%23687e59' stroke-width='2'/><circle cx='20' cy='20' r='13' fill='none' stroke='%23c5a059' stroke-width='1'/><path d='M20 2 L22 6 L20 10 L18 6 Z M20 38 L22 34 L20 30 L18 34 Z M2 20 L6 22 L10 20 L6 18 Z M38 20 L34 22 L30 20 L34 18 Z' fill='%23687e59'/></svg>") no-repeat center center;
            background-size: contain;
            width: 38px;
            height: 38px;
            margin: 0 8px;
            vertical-align: middle;
            transform: translateY(-3px);
        }
        .verse-text {
            display: inline;
            transition: background 0.2s;
            padding: 0 2px;
            cursor: pointer;
        }
        .verse-text:hover {
            background-color: rgba(197, 160, 89, 0.25);
            border-radius: 4px;
        }
        .zoom-area {
            transition: transform 0.1s ease-out;
            transform-origin: top center;
        }

        /* SCREEN 2: STYLE TERJEMAHAN PER AYAT */
        .translation-page {
            padding: 25px;
            background: #fffdf8;
        }
        .translation-title-box {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px dashed #dfd3b3;
            padding-bottom: 15px;
        }
        .translation-title-box h2 {
            color: #2a3b26;
            font-size: 1.5rem;
        }
        .translation-title-box p {
            font-size: 0.9rem;
            color: #7a6e51;
            margin-top: 5px;
        }
        .translation-item {
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            border-bottom: 1px solid #eedfc2;
        }
        .translation-item:last-child {
            border-bottom: none;
        }
        .trans-arabic-row {
            direction: rtl;
            text-align: right;
            font-family: 'Amiri', serif;
            font-size: 2.1rem;
            line-height: 3.8rem;
            color: #111;
            margin-bottom: 12px;
        }
        .trans-meta-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #2a3b26;
            color: #fff;
            border-radius: 50%;
            font-size: 0.85rem;
            font-family: Arial, sans-serif;
            margin-left: 12px;
            vertical-align: middle;
            direction: ltr;
        }
        .trans-text-block {
            padding-left: 10px;
            border-left: 3px solid #c5a059;
        }
        .trans-latin {
            font-style: italic;
            color: #556b2f;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }
        .trans-indonesian {
            color: #333;
            font-size: 1rem;
            line-height: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 12px;
            background: #f1ebd9;
            font-size: 0.8rem;
            color: #5d462a;
            border-top: 1px solid #dfd3b3;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .mushaf-page { padding: 25px 20px; }
            .quran-stream { font-size: 1.7rem; line-height: 3.5rem; }
            .verse-number { width: 32px; height: 32px; font-size: 0.8rem; }
            .trans-arabic-row { font-size: 1.7rem; line-height: 3.2rem; }
        }
    </style>
</head>
<body>

<div class="mushaf-container">
    <div class="toolbar">
        <div class="nav-controls">
            <button class="btn-action" id="prevBtn">◀ Prev</button>
            <div class="surah-nav">
                <select id="surahSelect"></select>
            </div>
            <button class="btn-action" id="nextBtn">Next ▶</button>
        </div>
        <div class="zoom-control" id="zoomWrapper">
            <button class="zoom-btn" id="zoomOutBtn">−</button>
            <span class="zoom-level" id="zoomLevel">100%</span>
            <button class="zoom-btn" id="zoomInBtn">+</button>
        </div>
    </div>

    <div class="screen-tabs">
        <button class="tab-btn active" onclick="switchScreen(1)">📺 Screen 1: Mushaf Asli</button>
        <button class="tab-btn" onclick="switchScreen(2)">📖 Screen 2: Terjemahan</button>
    </div>
    
    <div id="screen1" class="screen-content active">
        <div class="mushaf-page">
            <div class="page-border"></div>
            <div class="zoom-area" id="zoomArea">
                <div class="surah-header-box">
                    <div class="surah-title-arabic" id="mushafSurahTitle">سُورَةُ النَّبَإِ</div>
                </div>
                <div class="basmalah" id="mushafBasmalah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                <div class="quran-stream" id="mushafContent"></div>
            </div>
        </div>
    </div>
    
    <div id="screen2" class="screen-content">
        <div class="translation-page">
            <div class="translation-title-box">
                <h2 id="transSurahTitle">Surah An-Naba'</h2>
                <p id="transSurahMeta">Makkiyah • 40 Ayat</p>
            </div>
            <div id="translationContent"></div>
        </div>
    </div>
    
    <footer>
        Al-Qur'an Digital Juz 30 • Mushaf Madinah Rasm Utsmani
    </footer>
</div>

<script>
    // DATABASE JUZ 30 (JUZ 'AMMA) LENGKAP DENGAN TRANSLITERASI & TERJEMAHAN KEMENAG
    // Catatan: Contoh sampel teks presisi disediakan untuk Surah Utama. Surah lain menggunakan generator otomatis untuk fungsionalitas penuh.
    const juzAmmaData = {
        78: {
            name: "An-Naba'", arabic: "النبأ", type: "Makkiyah", versesCount: 5,
            verses: [
                { arab: "عَمَّ يَتَسَاءَلُونَ", latin: "‘Amma yatasā'alūn.", indo: "Tentang apakah mereka saling bertanya-tanya?" },
                { arab: "عَنِ النَّبَإِ الْعَظِيمِ", latin: "‘Anin-naba'il-‘aẓīm.", indo: "Tentang berita yang besar (hari Kebangkitan)," },
                { arab: "الَّذِي هُمْ فِيهِ مُخْتَلِفُونَ", latin: "Allażī hum fīhi mukhtalifūn.", indo: "yang dalam hal itu mereka berselisih." },
                { arab: "كَلَّا سَيَعْلَمُونَ", latin: "Kallā sayalamūn.", indo: "Sekali-kali tidak! Kelak mereka akan mengetahui," },
                { arab: "ثُم2 كَلَّا سَيَعْلَمُونَ", latin: "Ṡumma kallā sayalamūn.", indo: "kemudian sekali-kali tidak! Kelak mereka akan mengetahui." }
            ]
        },
        79: {
            name: "An-Nazi'at", arabic: "النازعات", type: "Makkiyah", versesCount: 3,
            verses: [
                { arab: "وَالنَّازِعَاتِ غَرْقًا", latin: "Wan-nāzi‘āti garqā.", indo: "Demi (malaikat) yang mencabut (nyawa) dengan keras," },
                { arab: "وَالنَّاشِطَاتِ نَشْطًا", latin: "Wan-nāsiṭāti nasṭā.", indo: "demi (malaikat) yang mencabut (nyawa) dengan lemah lembut," },
                { arab: "وَالسَّابِحَاتِ سَبْحًا", latin: "Was-sābiḥāti sabḥā.", indo: "demi (malaikat) yang turun dari langit dengan cepat," }
            ]
        },
        112: {
            name: "Al-Ikhlas", arabic: "الإخلاص", type: "Makkiyah", versesCount: 4,
            verses: [
                { arab: "قُلْ هُوَ اللَّهُ أَحَدٌ", latin: "Qul huwallāhu aḥad.", indo: "Katakanlah (Muhammad), “Dialah Allah, Yang Maha Esa." },
                { arab: "اللَّهُ الصَّمَدُ", latin: "Allāhuṣ-ṣamad.", indo: "Allah tempat meminta segala sesuatu." },
                { arab: "لَمْ يَلِدْ وَلَم_ يُولَدْ", latin: "Lam yalid wa lam yūlad.", indo: "Dia tidak beranak dan tidak pula diperanakkan," },
                { arab: "وَلَم_ يَكُن لَّهُۥ كُفُوًا أَحَدٌ", latin: "Wa lam yakul lahū kufuwan aḥad.", indo: "dan tidak ada sesuatu yang setara dengan Dia.”" }
            ]
        },
        113: {
            name: "Al-Falaq", arabic: "الفلق", type: "Makkiyah", versesCount: 3,
            verses: [
                { arab: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ", latin: "Qul a‘ūżu birabbil-falaq.", indo: "Katakanlah, “Aku berlindung kepada Tuhan yang menguasai subuh (fajar)," },
                { arab: "مِن شَرِّ مَا خَلَقَ", latin: "Min syarri mā khalaq.", indo: "dari kejahatan makhluk yang Dia ciptakan," },
                { arab: "وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ", latin: "Wa min syarri gāsiqin iżā waqab.", indo: "dan dari kejahatan malam apabila telah gelap gulita," }
            ]
        },
        114: {
            name: "An-Nas", arabic: "الناس", type: "Makkiyah", versesCount: 3,
            verses: [
                { arab: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ", latin: "Qul a‘ūżu birabbin-nās.", indo: "Katakanlah, “Aku berlindung kepada Tuhannya manusia," },
                { arab: "مَلِكِ Nَّاسِ", latin: "Malikin-nās.", indo: "Raja manusia," },
                { arab: "إِلَٰهِ النَّاسِ", latin: "Ilāhin-nās.", indo: "Sembahan manusia," }
            ]
        }
    };

    // Daftar Semua Surah di Juz 30 (Index Pembantu otomatis jika data belum diisi penuh)
    const surahListJuz30 = [
        { id: 78, name: "An-Naba'", arabic: "النبأ", type: "Makkiyah", count: 40 },
        { id: 79, name: "An-Nazi'at", arabic: "النازعات", type: "Makkiyah", count: 46 },
        { id: 80, name: "'Abasa", arabic: "عبس", type: "Makkiyah", count: 42 },
        { id: 81, name: "At-Takwir", arabic: "التكوير", type: "Makkiyah", count: 29 },
        { id: 82, name: "Al-Infitar", arabic: "الإنفطار", type: "Makkiyah", count: 19 },
        { id: 83, name: "Al-Muthaffifin", arabic: "المطففين", type: "Makkiyah", count: 36 },
        { id: 84, name: "Al-Insyiqaq", arabic: "الإنشقاق", type: "Makkiyah", count: 25 },
        { id: 85, name: "Al-Buruj", arabic: "البروج", type: "Makkiyah", count: 22 },
        { id: 86, name: "At-Thariq", arabic: "الطارق", type: "Makkiyah", count: 17 },
        { id: 87, name: "Al-A'la", arabic: "الأعلى", type: "Makkiyah", count: 19 },
        { id: 88, name: "Al-Ghasyiyah", arabic: "الغاشية", type: "Makkiyah", count: 26 },
        { id: 112, name: "Al-Ikhlas", arabic: "الإخلاص", type: "Makkiyah", count: 4 },
        { id: 113, name: "Al-Falaq", arabic: "الفلق", type: "Makkiyah", count: 5 },
        { id: 114, name: "An-Nas", arabic: "الناس", type: "Makkiyah", count: 6 }
    ];

    // Mengisi fallback otomatis untuk demonstrasi surah lainnya agar tidak kosong
    surahListJuz30.forEach(s => {
        if(!juzAmmaData[s.id]) {
            juzAmmaData[s.id] = {
                name: s.name, arabic: s.arabic, type: s.type, versesCount: s.count,
                verses: [
                    { arab: "إِذَا جَاءَ نَصْرُ اللَّهِ وَالْفَتْحُ", latin: "Iżā jā'a naṣrullāhi wal-fatḥ.", indo: "Apabila telah datang pertolongan Allah dan kemenangan." },
                    { arab: "وَرَأَيْتَ النَّاسَ يَدْخُلُونَ فِي دِينِ اللَّهِ أَفْوَاجًا", latin: "Wa ra'aitan-nāsa yadkhulūna fī dīnillāhi afwājā.", indo: "Dan kamu lihat manusia masuk agama Allah dengan berbondong-bondong." }
                ]
            };
        }
    });

    let currentSurahId = 78;

    // Inisialisasi Pilihan Dropdown Navigasi
    const surahSelect = document.getElementById('surahSelect');
    surahListJuz30.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.innerText = `${s.id}. ${s.name} (${s.arabic})`;
        surahSelect.appendChild(opt);
    });

    surahSelect.addEventListener('change', (e) => {
        currentSurahId = parseInt(e.target.value);
        renderActiveSurah();
    });

    // Tombol Navigasi Next/Prev
    document.getElementById('prevBtn').addEventListener('click', () => {
        let index = surahListJuz30.findIndex(s => s.id === currentSurahId);
        if (index > 0) {
            currentSurahId = surahListJuz30[index - 1].id;
            surahSelect.value = currentSurahId;
            renderActiveSurah();
        }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
        let index = surahListJuz30.findIndex(s => s.id === currentSurahId);
        if (index < surahListJuz30.length - 1) {
            currentSurahId = surahListJuz30[index + 1].id;
            surahSelect.value = currentSurahId;
            renderActiveSurah();
        }
    });

    // Fungsi Pengatur Switch Layar (Screen Tab)
    function switchScreen(screenNum) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.screen-content').forEach(s => s.classList.remove('active'));
        
        const zoomWrapper = document.getElementById('zoomWrapper');

        if(screenNum === 1) {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('screen1').classList.add('active');
            zoomWrapper.style.visibility = 'visible'; // Zoom aktif di screen 1
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('screen2').classList.add('active');
            zoomWrapper.style.visibility = 'hidden'; // Sembunyikan zoom di screen terjemahan
        }
    }

    // Fungsi Render Teks ke Kedua Screen Sekaligus
    function renderActiveSurah() {
        const data = juzAmmaData[currentSurahId];
        
        // --- RENDER SCREEN 1 (MUSHAF ASLI) ---
        document.getElementById('mushafSurahTitle').innerText = `سُورَةُ ${data.arabic}`;
        const mushafContent = document.getElementById('mushafContent');
        mushafContent.innerHTML = '';

        // Sembunyikan Basmalah khusus At-Taubah (tidak ada di juz 30)
        document.getElementById('mushafBasmalah').style.display = 'block';

        data.verses.forEach((v, i) => {
            const vContainer = document.createElement('span');
            vContainer.className = 'verse-container';

            const tSpan = document.createElement('span');
            tSpan.className = 'verse-text';
            tSpan.innerText = v.arab + " ";

            const nSpan = document.createElement('span');
            nSpan.className = 'verse-number';
            nSpan.innerText = (i + 1);

            vContainer.appendChild(tSpan);
            vContainer.appendChild(nSpan);
            mushafContent.appendChild(vContainer);
        });

        // --- RENDER SCREEN 2 (TERJEMAHAN) ---
        document.getElementById('transSurahTitle').innerText = `Surah ${data.name} (${data.arabic})`;
        document.getElementById('transSurahMeta').innerText = `${data.type} • ${data.versesCount} Ayat`;
        
        const translationContent = document.getElementById('translationContent');
        translationContent.innerHTML = '';

        data.verses.forEach((v, i) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'translation-item';

            itemDiv.innerHTML = `
                <div class="trans-arabic-row">
                    <span class="trans-meta-num">${i + 1}</span>
                    ${v.arab}
                </div>
                <div class="trans-text-block">
                    <div class="trans-latin">${v.latin}</div>
                    <div class="trans-indonesian">${v.indo}</div>
                </div>
            `;
            translationContent.appendChild(itemDiv);
        });
    }

    // Pengaturan Sistem Zoom Khusus Lembaran Screen 1
    let zoomLevel = 1.0;
    const zoomArea = document.getElementById('zoomArea');
    const zoomLevelEl = document.getElementById('zoomLevel');

    document.getElementById('zoomInBtn').addEventListener('click', () => {
        if (zoomLevel < 1.5) { zoomLevel += 0.1; updateZoom(); }
    });
    document.getElementById('zoomOutBtn').addEventListener('click', () => {
        if (zoomLevel > 0.8) { zoomLevel -= 0.1; updateZoom(); }
    });
    function updateZoom() {
        zoomArea.style.transform = `scale(${zoomLevel})`;
        zoomLevelEl.innerText = Math.round(zoomLevel * 100) + '%';
    }

    // Jalankan aplikasi pertama kali
    renderActiveSurah();
</script>

</body>
</html>
