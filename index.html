<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Grid Editor Simpel - Edisi StickIt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Impor font yang lebih 'teknis' agar serasi dengan screenshot Anda */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        :root {
            --bg-color: #f0f2f5;
            --card-color: #ffffff;
            --primary-color: #1e3a8a; /* Warna biru donker yang lebih profesional */
            --accent-color: #3b82f6; /* Warna biru cerah */
            --sticker-panel-bg: #0d1117; /* Latar belakang gelap seperti screenshot */
            --sticker-text-color: #c9d1d9;
            --sticker-active-text-color: #f0f6fc;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #111;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Panel Kontrol/Sidebar */
        .control-panel {
            background: var(--card-color);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            height: fit-content;
        }

        h2.panel-title { margin-top: 0; font-size: 1.7rem; font-weight: 700; color: #111; margin-bottom: 25px; }
        h3 { font-size: 1.2rem; font-weight: 500; margin-bottom: 12px; color: #444; }

        .control-group {
            margin-bottom: 25px;
        }

        /* Tombol Layout */
        .layout-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .layout-btn {
            background: #e5e7eb;
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease-in-out;
            color: #555;
        }

        .layout-btn:hover {
            background: #d1d5db;
        }

        .layout-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Slider */
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 7px;
            font-weight: 500;
            color: #555;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        /* Tombol Aksi */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease-in-out, transform 0.1s;
            text-align: center;
        }

        .btn:active { transform: translateY(1px); }

        .btn-download {
            background: #10b981;
            color: white;
            grid-column: span 2;
        }
        .btn-download:hover { background: #059669; }

        .btn-clear {
            background: #ef4444;
            color: white;
        }
        .btn-clear:hover { background: #dc2626; }

        .btn-logo {
            background: var(--accent-color);
            color: white;
        }
        .btn-logo:hover { background: #2563eb; }


        /* PANEL STIKER & LOGO - TERINSPIRASI DARI SCREENSHOT */
        .sticker-panel-container {
            margin-top: 30px;
            background: var(--sticker-panel-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #30363d;
        }

        .sticker-tabs {
            display: flex;
            border-bottom: 2px solid #30363d;
            margin-bottom: 15px;
        }

        .sticker-tab {
            padding: 10px 20px;
            color: var(--sticker-text-color);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            position: relative;
        }

        .sticker-tab.active {
            color: var(--sticker-active-text-color);
        }

        .sticker-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-color);
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px; /* Spasi untuk scrollbar */
        }

        /* Gaya scrollbar tipis untuk panel stiker */
        .sticker-grid::-webkit-scrollbar {
            width: 6px;
        }
        .sticker-grid::-webkit-scrollbar-thumb {
            background-color: #30363d;
            border-radius: 3px;
        }

        .sticker-item {
            aspect-ratio: 1;
            background: #000;
            border: 1px solid #1a1f26;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: border-color 0.1s;
        }

        .sticker-item:hover {
            border-color: var(--accent-color);
        }

        .sticker-item img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }


        /* KOLOM LOGO ANDA */
        .logo-upload-group {
            margin-top: 25px;
            border-top: 1px solid #30363d;
            padding-top: 20px;
        }

        #logo-slot-container {
            display: none; /* Disembunyikan sampai tombol "Logo" ditekan */
            margin-top: 15px;
        }

        .logo-slot {
            width: 100px; /* Ukuran default logo */
            aspect-ratio: 1;
            background: #f3f4f6;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            float: right; /* Contoh posisi logo */
            margin-left: 15px;
        }

        .logo-slot:hover {
            background: #e2e8f0;
            border-color: var(--accent-color);
        }

        .logo-slot input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .logo-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
        }

        .logo-upload-msg {
            font-size: 0.7rem;
            color: #64748b;
            pointer-events: none;
            text-align: center;
            padding: 5px;
        }


        /* AREA PREVIEW FOTO */
        .preview-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--card-color);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            min-height: 600px;
        }

        #grid-export-area {
            position: relative; /* Penting untuk logo melayang */
            padding: 10px; /* Padding default */
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 12px;
            width: 100%;
            max-width: 550px;
        }

        /* Kotak Grid Utama */
        #photo-grid {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: grid;
            gap: 10px;
            box-sizing: border-box;
        }

        /* Kotak Tempat Foto (Slot) */
        .grid-slot {
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .grid-slot:hover {
            background: #f1f5f9;
            border-color: var(--accent-color);
        }

        .grid-slot input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2; /* Agar file input selalu di atas stiker/logo */
        }

        .grid-slot img.slot-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .upload-msg {
            font-size: 0.9rem;
            color: #94a3b8;
            pointer-events: none;
            text-align: center;
            padding: 15px;
            z-index: 0;
        }

        /* GAYA STIKER YANG DITAMBAHKAN KE SLOT */
        .added-sticker {
            position: absolute;
            z-index: 2; /* Di atas foto, di bawah file input */
            max-width: 40%;
            max-height: 40%;
            object-fit: contain;
            cursor: move; /* Menunjukkan stiker bisa dipindahkan */
        }

        /* Gaya untuk logo yang ditambahkan langsung ke export area */
        .main-export-logo {
            position: absolute;
            z-index: 3; /* Paling atas */
            max-width: 15%; /* Ukuran logo default */
            max-height: 15%;
            object-fit: contain;
            cursor: move;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <h2 class="panel-title">StickIt Grid Editor</h2>

        <div class="control-group">
            <h3>1. Pilih Layout</h3>
            <div class="layout-options">
                <div class="layout-btn active" onclick="changeLayout('grid-2x2')">2 x 2</div>
                <div class="layout-btn" onclick="changeLayout('grid-3x3')">3 x 3</div>
                <div class="layout-btn" onclick="changeLayout('grid-1-2')">Split</div>
            </div>
        </div>

        <div class="control-group">
            <div class="slider-label">
                <span>Jarak Foto (Gap)</span>
                <span id="gap-val">10px</span>
            </div>
            <input type="range" id="gap-slider" min="0" max="40" value="10" oninput="updateGridStyles()">
        </div>

        <div class="control-group">
            <div class="slider-label">
                <span>Kebulatan Sudut</span>
                <span id="radius-val">8px</span>
            </div>
            <input type="range" id="radius-slider" min="0" max="60" value="8" oninput="updateGridStyles()">
        </div>

        <div class="sticker-panel-container">
            <div class="sticker-tabs">
                <div class="sticker-tab active">USER STICKERS</div>
                <div class="sticker-tab">ALL IMAGES</div>
            </div>
            <div class="sticker-grid" id="sticker-grid">
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker1')"><img src="sticker1.png" alt="100% Satisfaction"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker2')"><img src="sticker2.png" alt="Bisa COD"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker3')"><img src="sticker3.png" alt="Classic Semakin di Depan"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker4')"><img src="sticker4.png" alt="Best Seller Red"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker5')"><img src="sticker5.png" alt="Gear Logo"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker6')"><img src="sticker6.png" alt="Murah Card"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker7')"><img src="sticker7.png" alt="Genuine Parts Text"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker8')"><img src="sticker8.png" alt="COD Cash on Delivery"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker9')"><img src="sticker9.png" alt="VR Logo"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker10')"><img src="sticker10.png" alt="M Logo Red"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker11')"><img src="sticker11.png" alt="Ar Genuine Text"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker12')"><img src="sticker12.png" alt="Classic Text Logo"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker13')"><img src="sticker13.png" alt="Kawas Logo"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker14')"><img src="sticker14.png" alt="Suzuki Logo"></div>
                <div class="sticker-item" onclick="addStickerToActiveSlot('sticker15')"><img src="sticker15.png" alt="SM Logo"></div>
            </div>
            <p style="color: #64748b; font-size: 0.8rem; margin-top: 10px; text-align: center;">Klik slot foto dulu, lalu klik stiker.</p>
        </div>

        <div class="action-buttons">
            <button class="btn btn-clear" onclick="clearActiveSlotStickers()">Hapus Stiker di Slot</button>
            <button class="btn btn-logo" onclick="toggleLogoSlot()">Tambah Logo Utama</button>
            <button class="btn btn-download" onclick="downloadGrid()">Unduh Gambar Hasil ✨</button>
        </div>

        <div id="logo-slot-container" class="logo-upload-group control-group">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>2. Logo Anda</h3>
                <div class="slider-label">
                    <span>Ukuran Logo</span>
                    <span id="logo-size-val">15%</span>
                </div>
                <input type="range" id="logo-size-slider" min="5" max="40" value="15" oninput="updateLogoSize()">
            </div>
            
            <div class="logo-slot" onclick="document.getElementById('logo-file-input').click()">
                <span class="logo-upload-msg">Klik untuk Logo Anda</span>
                <input type="file" id="logo-file-input" accept="image/*" onchange="previewLogo(this)">
            </div>
            <div style="clear: both;"></div>
            <p style="color: #64748b; font-size: 0.8rem; margin-top: 5px;">Logo ini akan diletakkan secara bebas di atas hasil ekspor.</p>
        </div>

    </div>

    <div class="preview-container">
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 15px;">1x1 Square Grid</p>
        <div id="grid-export-area">
            <div id="photo-grid" class="grid-2x2">
                </div>
            </div>
    </div>
</div>

<script>
    const gridExportArea = document.getElementById('grid-export-area');
    const gridContainer = document.getElementById('photo-grid');
    const gapSlider = document.getElementById('gap-slider');
    const radiusSlider = document.getElementById('radius-slider');
    const logoSizeSlider = document.getElementById('logo-size-slider');
    const logoSlotContainer = document.getElementById('logo-slot-container');

    // Struktur CSS Grid untuk masing-masing layout
    const layouts = {
        'grid-2x2': {
            slots: 4,
            style: "grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr);"
        },
        'grid-3x3': {
            slots: 9,
            style: "grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);"
        },
        'grid-1-2': {
            slots: 3,
            style: "grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr);",
            customSlots: (i) => {
                if (i === 0) return "grid-row: span 2;";
                return "";
            }
        }
    };

    let currentLayout = 'grid-2x2';
    let activeSlot = null; // Menyimpan slot mana yang sedang dipilih
    let currentMainLogo = null; // Menyimpan referensi ke logo utama di export area

    // Fungsi mengganti layout grid
    function changeLayout(layoutName) {
        currentLayout = layoutName;
        activeSlot = null; // Reset slot aktif saat layout berubah
        
        // Update status aktif tombol
        document.querySelectorAll('.layout-btn').forEach(btn => btn.classList.remove('active'));
        if(event) event.target.classList.add('active');

        generateSlots();
    }

    // Fungsi membuat kotak upload foto berdasarkan layout yang dipilih
    function generateSlots() {
        gridContainer.innerHTML = '';
        const layoutConfig = layouts[currentLayout];
        
        gridContainer.setAttribute('style', layoutConfig.style);

        for (let i = 0; i < layoutConfig.slots; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.slotId = i; // Untuk identifikasi
            
            // Klik slot untuk menandainya sebagai aktif untuk stiker
            slot.addEventListener('click', function(e) {
                // Pastikan kita tidak mengklik file input atau stiker
                if (e.target === slot || e.target.classList.contains('upload-msg')) {
                    setActiveSlot(slot);
                }
            });
            
            // Terapkan custom rule jika ada
            if (layoutConfig.customSlots) {
                slot.style.cssText += layoutConfig.customSlots(i);
            }

            slot.innerHTML = `
                <span class="upload-msg">1. Klik untuk Foto</span>
                <input type="file" accept="image/*" onchange="previewImage(this)">
            `;
            gridContainer.appendChild(slot);
        }
        updateGridStyles();
    }

    // Fungsi untuk menandai slot mana yang aktif
    function setActiveSlot(slot) {
        // Hapus penanda aktif dari slot lain
        const allSlots = document.querySelectorAll('.grid-slot');
        allSlots.forEach(s => s.style.borderColor = ''); 

        // Tandai slot ini sebagai aktif
        activeSlot = slot;
        activeSlot.style.borderColor = var(--accent-color);
        activeSlot.style.borderStyle = 'solid'; // Berubah menjadi solid untuk penandaan kuat
    }

    // Fungsi menangani preview foto saat user upload gambar
    function previewImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const slot = input.parentElement;
                
                // Setel slot ini sebagai aktif secara otomatis
                setActiveSlot(slot);

                // Hapus preview foto lama jika ada
                const oldImg = slot.querySelector('img.slot-image');
                if (oldImg) oldImg.remove();

                const img = document.createElement('img');
                img.className = 'slot-image';
                img.src = e.target.result;
                slot.appendChild(img);
                
                // Sembunyikan tulisan panduan upload
                slot.querySelector('.upload-msg').style.display = 'none';
                updateGridStyles(); // Pastikan border radius terpasang
            }
            reader.readAsDataURL(file);
        }
    }

    // FITUR STIKER - DITAMBAHKAN
    function addStickerToActiveSlot(stickerName) {
        if (!activeSlot) {
            alert('Silakan klik salah satu kotak foto terlebih dahulu untuk memilih tempat stiker!');
            return;
        }

        // Cari gambar stiker yang diklik di panel stiker
        const stickerSrc = event.currentTarget.querySelector('img').src;

        // Buat elemen stiker baru untuk ditambahkan ke slot aktif
        const stickerImg = document.createElement('img');
        stickerImg.className = 'added-sticker';
        stickerImg.src = stickerSrc;
        
        // Posisikan stiker secara default (misal: pojok kanan bawah)
        stickerImg.style.bottom = '5px';
        stickerImg.style.right = '5px';

        activeSlot.appendChild(stickerImg);
        
        // Buat stiker bisa dipindahkan
        makeElementDraggable(stickerImg, activeSlot);
    }

    // Fungsi untuk menghapus semua stiker di slot aktif
    function clearActiveSlotStickers() {
        if (!activeSlot) {
            alert('Silakan klik salah satu kotak foto terlebih dahulu!');
            return;
        }
        const stickers = activeSlot.querySelectorAll('.added-sticker');
        stickers.forEach(s => s.remove());
    }

    // FITUR LOGO UTAMA - DITAMBAHKAN
    function toggleLogoSlot() {
        const isDisplayed = logoSlotContainer.style.display === 'block';
        logoSlotContainer.style.display = isDisplayed ? 'none' : 'block';
        
        if (!isDisplayed) {
            // Scroll ke logo slot agar terlihat
            logoSlotContainer.scrollIntoView({ behavior: 'smooth' });
        }
    }

    function previewLogo(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const slot = input.parentElement;
                
                // Hapus preview logo lama di panel kontrol
                const oldPanelImg = slot.querySelector('img');
                if (oldPanelImg) oldPanelImg.remove();

                // Tampilkan di panel kontrol
                const panelImg = document.createElement('img');
                panelImg.src = e.target.result;
                slot.appendChild(panelImg);
                slot.querySelector('.logo-upload-msg').style.display = 'none';

                // TAMBAHKAN ATAU PERBARUI LOGO UTAMA DI EKSPOR AREA
                if (currentMainLogo) currentMainLogo.remove();

                currentMainLogo = document.createElement('img');
                currentMainLogo.className = 'main-export-logo';
                currentMainLogo.src = e.target.result;
                
                // Posisikan secara default (pojok kanan atas)
                currentMainLogo.style.top = '10px';
                currentMainLogo.style.right = '10px';

                gridExportArea.appendChild(currentMainLogo);
                
                // Buat logo utama bisa dipindahkan
                makeElementDraggable(currentMainLogo, gridExportArea);
                
                // Setel ukuran awal
                updateLogoSize();
            }
            reader.readAsDataURL(file);
        }
    }

    function updateLogoSize() {
        const size = logoSizeSlider.value;
        document.getElementById('logo-size-val').innerText = size + '%';
        
        if (currentMainLogo) {
            currentMainLogo.style.maxWidth = size + '%';
            currentMainLogo.style.maxHeight = size + '%';
        }
    }


    // FUNGSI UNTUK MEMBUAT ELEMEN BISA DRAG & DROP
    function makeElementDraggable(elmnt, container) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        elmnt.onmousedown = dragMouseDown;

        function dragMouseDown(e) {
            e = e || window.event;
            e.preventDefault();
            // get the mouse cursor position at startup:
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            // call a function whenever the cursor moves:
            document.onmousemove = elementDrag;
        }

        function elementDrag(e) {
            e = e || window.event;
            e.preventDefault();
            // calculate the new cursor position:
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            // set the element's new position:
            const newTop = elmnt.offsetTop - pos2;
            const newLeft = elmnt.offsetLeft - pos1;

            // Batasi agar tidak keluar dari container
            if (newTop >= 0 && newTop + elmnt.offsetHeight <= container.offsetHeight) {
                elmnt.style.top = newTop + "px";
            }
            if (newLeft >= 0 && newLeft + elmnt.offsetWidth <= container.offsetWidth) {
                elmnt.style.left = newLeft + "px";
            }
        }

        function closeDragElement() {
            // stop moving when mouse button is released:
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }


    // Fungsi update Jarak (Gap) dan Kebulatan (Border Radius)
    function updateGridStyles() {
        const gap = gapSlider.value;
        const radius = radiusSlider.value;

        document.getElementById('gap-val').innerText = gap + 'px';
        document.getElementById('radius-val').innerText = radius + 'px';

        gridExportArea.style.padding = gap + 'px';
        gridContainer.style.gap = gap + 'px';

        const slots = document.querySelectorAll('.grid-slot');
        slots.forEach(slot => {
            slot.style.borderRadius = radius + 'px';
            const img = slot.querySelector('img.slot-image');
            if (img) img.style.borderRadius = radius + 'px';
        });
    }

    // Fungsi Download Grid menjadi Gambar PNG
    function downloadGrid() {
        // Cek apakah sudah ada foto yang dimasukkan
        const imgs = gridContainer.querySelectorAll('img.slot-image');
        if(imgs.length === 0) {
            alert('Silakan masukkan minimal satu foto terlebih dahulu!');
            return;
        }

        // Jalankan proses konversi html ke canvas gambar
        html2canvas(gridExportArea, {
            useCORS: true, 
            scale: 2 // Meningkatkan kualitas
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'stickit-grid.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    // Jalankan grid pertama kali saat halaman dimuat
    generateSlots();
</script>

</body>
</html>
